<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>FusionKit — UI 重设计</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Geist / Geist Mono — modern technical type pairing -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="tokens.css" />

  <style>
    @keyframes fk-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.92); opacity: 0.75; }
    }
    /* Slight surface tint outside the window frame */
    body { background: radial-gradient(120% 80% at 50% 0%, #ece9e2 0%, #ddd9d0 60%, #c6c0b3 100%); }
    body[data-page-theme="dark"] { background: radial-gradient(120% 80% at 50% 0%, #161412 0%, #0c0a08 100%); }
  </style>

  <!-- React + Babel pinned -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="screens-tools.jsx"></script>
  <script type="text/babel" src="screens-translator.jsx"></script>
  <script type="text/babel" src="screens-settings.jsx"></script>
  <script type="text/babel" src="screens-about.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    // Mirror data-theme to body for outer page background
    const obs = new MutationObserver(() => {
      const fk = document.querySelector(".fk-app");
      if (fk) document.body.setAttribute("data-page-theme", fk.getAttribute("data-theme") || "light");
    });
    obs.observe(document.body, { subtree: true, attributes: true, attributeFilter: ["data-theme"] });
  </script>
</body>
</html>
